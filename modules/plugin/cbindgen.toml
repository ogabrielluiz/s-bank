language = "C"
header = "/* S-Bank plugin C ABI. Generated by cbindgen; do not edit by hand. */"
include_guard = "S_BANK_H"
autogen_warning = "/* This file is auto-generated. */"
no_includes = false
cpp_compat = true

[export]
prefix = ""

[parse]
# Expand the component crates so their opaque handle types (Lpg, StrikeVoice) and any
# referenced consts are emitted into the single combined header.
parse_deps = true
include = ["vactrol-core", "strike-core"]
