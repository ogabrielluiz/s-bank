<?xml version="1.0" encoding="UTF-8"?>
<!-- S-Bank Strike panel, 16HP (81.28 x 128.5 mm). Authored in mm so coordinates
     match the widget's mm2px() placements. Sam-e visual language. -->
<svg xmlns="http://www.w3.org/2000/svg" version="1.1"
     width="81.28mm" height="128.5mm" viewBox="0 0 81.28 128.5">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="128.5" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#211d3a"/>
      <stop offset="1" stop-color="#15131f"/>
    </linearGradient>
    <style>
      text { font-family: Helvetica, Arial, sans-serif; fill: #c8c2f0; }
      .tag  { font-size: 2.4px; letter-spacing: .12px; }
      .lbl  { font-size: 1.9px; letter-spacing: .1px; }
      .sm   { font-size: 1.6px; fill: #9b93d6; }
      .accent { fill: #d6b3ff; }
    </style>
  </defs>

  <rect x="0" y="0" width="81.28" height="128.5" fill="url(#bg)"/>
  <rect x="0.4" y="0.4" width="80.48" height="127.7" fill="none" stroke="#3a3560" stroke-width="0.3" rx="1.2"/>

  <!-- header -->
  <text x="4" y="7" class="tag" font-weight="700" fill="#e8e4ff">S<tspan fill="#FF5A00">-</tspan>BANK</text>
  <text x="77.28" y="7" class="tag" font-weight="700" text-anchor="end" fill="#e8e4ff">STRIKE</text>
  <line x1="4" y1="9" x2="77.28" y2="9" stroke="#3a3560" stroke-width="0.25"/>

  <!-- per-channel labels (columns at x=22 and x=59.28) -->
  <g text-anchor="middle">
    <!-- channel headers -->
    <text x="22"    y="13" class="sm">CH A</text>
    <text x="59.28" y="13" class="sm">CH B</text>

    <!-- knob labels (knobs centred at y=18/36/54) -->
    <text x="22"    y="25.5" class="lbl">OPEN</text>
    <text x="59.28" y="25.5" class="lbl">OPEN</text>
    <text x="22"    y="43.5" class="lbl">DECAY</text>
    <text x="59.28" y="43.5" class="lbl">DECAY</text>
    <text x="22"    y="61.5" class="lbl">MATERIAL</text>
    <text x="59.28" y="61.5" class="lbl">MATERIAL</text>

    <!-- trimmer labels (trims at y=69, x∓8) -->
    <text x="14"    y="74.5" class="sm">DEC</text>
    <text x="30"    y="74.5" class="sm">CTL</text>
    <text x="51.28" y="74.5" class="sm">DEC</text>
    <text x="67.28" y="74.5" class="sm">CTL</text>

    <!-- jack labels -->
    <text x="13"    y="98.5" class="sm">IN</text>
    <text x="31"    y="98.5" class="sm">HIT</text>
    <text x="50.28" y="98.5" class="sm">IN</text>
    <text x="68.28" y="98.5" class="sm">HIT</text>
    <text x="13"    y="111.5" class="sm">DEC</text>
    <text x="31"    y="111.5" class="sm">CTL</text>
    <text x="50.28" y="111.5" class="sm">DEC</text>
    <text x="68.28" y="111.5" class="sm">CTL</text>
    <text x="22"    y="124.5" class="sm accent">OUT</text>
    <text x="59.28" y="124.5" class="sm accent">OUT</text>
  </g>

  <!-- centre divider + imperfection label -->
  <line x1="40.64" y1="12" x2="40.64" y2="110" stroke="#2c2748" stroke-width="0.25"/>
  <text x="40.64" y="113" class="sm" text-anchor="middle">IMPERF</text>

  <!-- footer brand -->
  <text x="40.64" y="127" class="sm" text-anchor="middle" font-weight="600" letter-spacing="0.3">SAM-e</text>
</svg>
