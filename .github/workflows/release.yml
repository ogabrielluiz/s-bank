name: release

# Builds the .vcvplugin for every platform and attaches them to a GitHub Release.
#   - Push a tag matching the plugin.json version, e.g. `git tag v0.1.0 && git push --tags`.
#   - Or run manually (workflow_dispatch) to build all platforms WITHOUT publishing.
# Windows + Linux are cross-compiled in the rack-plugin-toolchain container; macOS
# (x64 + arm64) is built natively on a macOS runner against the Rack SDK.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  rack-sdk-version: latest
  toolchain-dir: /home/build/rack-plugin-toolchain

defaults:
  run:
    shell: bash

jobs:
  build-win-lin:
    name: build (${{ matrix.platform }})
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/qno/rack-plugin-toolchain-win-linux
      options: --user root
    strategy:
      fail-fast: false
      matrix:
        platform: [win-x64, lin-x64]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build plugin (${{ matrix.platform }})
        run: |
          export PLUGIN_DIR="$GITHUB_WORKSPACE/modules/rack"
          pushd "${{ env.toolchain-dir }}"
          make plugin-build-${{ matrix.platform }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: ${{ env.toolchain-dir }}/plugin-build/*.vcvplugin
          if-no-files-found: error

  build-mac:
    name: build (mac-${{ matrix.platform }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [x64, arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Get the Rack SDK (per-arch; VCV no longer ships a universal mac SDK)
        run: |
          pushd "$HOME"
          wget -q -O Rack-SDK.zip "https://vcvrack.com/downloads/Rack-SDK-${{ env.rack-sdk-version }}-mac-${{ matrix.platform }}.zip"
          unzip -q Rack-SDK.zip
      - name: Build plugin (mac-${{ matrix.platform }})
        working-directory: modules/rack
        run: |
          # GitHub's macOS runner uses bash 3.2 — no associative arrays.
          case "${{ matrix.platform }}" in
            x64)   triple=x86_64-apple-darwin ;;
            arm64) triple=arm64-apple-darwin ;;
          esac
          export RACK_DIR="$HOME/Rack-SDK"
          export CROSS_COMPILE="$triple"
          make dep
          make dist
      - uses: actions/upload-artifact@v4
        with:
          name: mac-${{ matrix.platform }}
          path: modules/rack/dist/*.vcvplugin
          if-no-files-found: error

  publish:
    name: Publish release
    # Only publish for a v* tag; workflow_dispatch builds but does not release.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-win-lin, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Plugin version must match the tag
        run: |
          version="$(jq -r '.version' modules/rack/plugin.json)"
          if [ "v$version" != "${GITHUB_REF_NAME}" ]; then
            echo "::error::plugin.json version 'v$version' != tag '${GITHUB_REF_NAME}' — bump plugin.json or retag."
            exit 1
          fi
      - uses: actions/download-artifact@v4
        with:
          path: _artifacts
      - name: Create release and attach .vcvplugin assets
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: _artifacts/**/*.vcvplugin
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
