name: pr
on:
  pull_request:
    branches: [main]
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        fastmath: ["", "-Cllvm-args=-fp-contract=fast -ffast-math"]
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: ${{ matrix.fastmath }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace
  bench-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Dependency-free gate: ensure the benchmark target still compiles. A true
      # perf gate (CodSpeed instruction-count + wall-clock comparison) is an
      # opt-in future enhancement once a codspeed-criterion-compat shim is added;
      # see docs/CI.md.
      - run: cargo bench --bench lpg --no-run
