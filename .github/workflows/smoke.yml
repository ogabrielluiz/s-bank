name: smoke
on: [push]
jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
        # `-ffast-math` is a C/clang flag, not a rustc flag (rustc rejects it).
        # `-Cllvm-args=-fp-contract=fast` is the stable-rustc knob for FP
        # contraction (FMA), which is what affects bit-reproducibility here.
        fastmath: ["", "-Cllvm-args=-fp-contract=fast"]
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: ${{ matrix.fastmath }}
      # Cross-link the aarch64 cdylib/bin with the installed cross gcc (the apt
      # package below provides it). Ignored when building the host x86_64 target.
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install cross linker (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo build --target ${{ matrix.target }}
      # Fast must-pass subset (host target). No `smoke` test exists; these are the
      # quick foundational guards.
      - run: cargo test --test stability --test no_alloc --test vactrol_envelope
